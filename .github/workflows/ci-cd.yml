# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: CI/CD

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Inject application.yml
        env :
          APP_YML: ${{ secrets.APPLICATION_YML }}
        run : echo "$APP_YML" | base64 --decode > src/main/resources/application.yml

      # 환경별 application-{profile}.yml 주입 (PR이면 local, 아니면 deploy)
      - name: Inject profile-specific yml
        env:
          APP_YML_PROFILE: ${{ github.event_name == 'pull_request' && secrets.APPLICATION_LOCAL_YML || secrets.APPLICATION_DEPLOY_YML }}
        run: echo "$APP_YML_PROFILE" | base64 --decode > src/main/resources/application-${{ github.event_name == 'pull_request' && 'local' || 'deploy' }}.yml

      - name: Inject test.yml
        env:
          APP_YML_TEST: ${{ secrets.APPLICATION_TEST_YML }}
        run : echo "$APP_YML_TEST" | base64 --decode > src/test/resources/application-test.yml

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      # gradle 캐싱 (0)
      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: gradlew mod modify
        run: chmod +x gradlew

      - name: Set SPRING_PROFILE env
        env:
          SPRING_PROFILE: ${{ github.event_name == 'pull_request' && 'local' || 'deploy' }}
        run: ./gradlew build -x test -Dspring.profiles.active=$SPRING_PROFILE

      - name: Unit Test, Slice Test
        run: ./gradlew test -Dspring.profiles.active=test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        run: docker build . -t eunjoolee/todolist:latest

      - name: Push Docker image
        run: docker push eunjoolee/todolist:latest

  slack-notify:
    needs: build-and-test
    runs-on: ubuntu-latest
    if : always()
    permissions:
        contents: read

    steps:

      - name: Notify Slack on Success
        if: needs.build-and-test.result == 'success' # 이 step은 job이 성공한 경우에만 실행된다.
        id: slack-success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
          SLACK_COLOR: '#2DB400'
          SLACK_USERNAME: Github CI
          SLACK_ICON: https://github.com/github.png
          SLACK_TITLE: Message
          SLACK_MESSAGE: |
            브랜치 CI 테스트가 성공했습니다. :clap:
            ${{ github.event_name == 'pull_request' && format('PR 제목: {0}', github.event.pull_request.title) || '' }}

      - name: Notify Slack on Failure
        if: needs.build-and-test.result == 'failure' # 이 step은 job이 실패한 경우에만 실행됩니다.
        id: slack-failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
          SLACK_COLOR: '#ff0000'
          SLACK_USERNAME: Github CI
          SLACK_ICON: https://github.com/github.png
          SLACK_TITLE: Message
          SLACK_MESSAGE: |
            브랜치 CI 테스트가 실패했습니다. :boom:
            ${{ github.event_name == 'pull_request' && format('PR 제목: {0}', github.event.pull_request.title) || '' }}
        

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
      # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_SSH_USER }}
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd ~/backend
            git pull origin develop
            sudo docker-compose down
            sudo docker-compose pull
            sudo docker-compose up -d --build