version: "3"
services:
  db:
    image: mysql:8.0
    container_name: mysql-dev-container
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
    ports:
      - "3305:3306"
    networks:
      - spring-network

  redis:
    image: redis:7
    container_name: redis-dev-container
    ports:
      - "6379:6379"
    networks:
      - spring-network

  app:
    build: .
    container_name: backend-app
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    networks:
      - spring-network

networks:
  spring-network:
